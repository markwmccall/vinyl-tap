{% extends "base.html" %}
{% block title %} - NFC{% endblock %}

{% block content %}
<div class="settings-page">
  <a href="{{ url_for('settings') }}" class="settings-back">&#8249; Settings</a>
  <h1>NFC</h1>

  {% if saved %}
  <div class="banner success">Settings saved.</div>
  {% endif %}

  <form method="POST" action="/settings/nfc">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <div class="field">
      <label for="nfc_mode">NFC Mode</label>
      <select id="nfc_mode" name="nfc_mode">
        <option value="mock" {% if config.nfc_mode == 'mock' %}selected{% endif %}>
          mock (no hardware)
        </option>
        <option value="pn532" {% if config.nfc_mode == 'pn532' %}selected{% endif %}>
          pn532 (Raspberry Pi)
        </option>
      </select>
    </div>

    <button type="submit" class="save-btn">Save</button>
  </form>
</div>
{% endblock %}
